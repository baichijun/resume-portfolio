name: Deploy Multi-Platform

# 仅 main 分支 push 触发生产部署；其他分支不触发预览
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build (root path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Typecheck & build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.sha }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  build-github-pages:
    name: Build (GitHub Pages subpath)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build with repository base path
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_APP_VERSION: ${{ github.sha }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-gh
          path: dist
          retention-days: 1

  deploy-github-pages:
    name: Deploy GitHub Pages
    needs: build-github-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-gh
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

  deploy-cloudflare:
    name: Deploy Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=resume-portfolio

  deploy-vercel:
    name: Deploy Vercel (production)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build Vercel output
        run: npx vercel@latest build --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Deploy prebuilt output to Vercel
        run: npx vercel@latest deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
